<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Nati & Beniyas's Speedy Adventure</title>
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="game-wrapper">
      <div id="game-container"></div>
    </div>
    <div id="orientation-guard">
      <div class="card">
        <div class="icon">📱</div>
        <h2>Rotate to Landscape</h2>
        <p>This game plays best sideways — turn your device to landscape to continue.</p>
      </div>
    </div>
    <!--
      Bundled from js/ (ES modules, easier to maintain) into a single
      classic script via esbuild — NOT type="module". Smart TV browsers
      (Samsung/LG etc.) and other older embedded WebKit engines frequently
      have partial-to-no support for <script type="module">, which is a
      likely reason the game wouldn't load at all on a Samsung TV browser
      with no visible error. A plain bundled script has none of that risk,
      and as a bonus works over file:// too (no more "needs a local server"
      caveat for local testing). Run `npm run build` after editing js/ to
      regenerate dist/bundle.js — see README.md.
    -->
    <script src="dist/bundle.js"></script>
  </body>
</html>
